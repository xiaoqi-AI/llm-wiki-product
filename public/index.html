<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>llm-wiki 知识工作台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --surface: #fffefa;
      --surface-2: #f0ebe2;
      --ink: #24221e;
      --muted: #6f675d;
      --line: #d8d0c3;
      --red: #9a3d31;
      --green: #3f7565;
      --blue: #315f78;
      --amber: #a66f1d;
      --violet: #6d5a88;
      --shadow: 0 14px 34px rgba(36, 31, 26, .11);
      --radius: 8px;
      --left-width: 288px;
      --right-width: 380px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      background:
        linear-gradient(135deg, rgba(49, 95, 120, .08), transparent 34%),
        linear-gradient(225deg, rgba(154, 61, 49, .08), transparent 30%),
        var(--bg);
      color: var(--ink);
      font-family: var(--font);
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr);
      height: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      background: rgba(255, 254, 250, .9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 248px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      background: var(--red);
      color: #fffefa;
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .search {
      flex: 1;
      min-width: 220px;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 95, 120, .14);
    }

    .tabs {
      display: flex;
      gap: 6px;
      white-space: nowrap;
    }

    .tab,
    .chip,
    .mini-button {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
    }

    .tab {
      height: 38px;
      padding: 0 12px;
    }

    .tab.active {
      color: white;
      border-color: var(--blue);
      background: var(--blue);
    }

    .workspace {
      display: grid;
      grid-template-columns: var(--left-width) 8px minmax(420px, 1fr) 8px var(--right-width);
      min-height: 0;
    }

    .sidebar,
    .detail-panel {
      min-height: 0;
      overflow: hidden;
      background: rgba(255, 254, 250, .86);
    }

    .sidebar {
      border-right: 1px solid var(--line);
    }

    .detail-panel {
      border-left: 1px solid var(--line);
    }

    .resize-handle {
      position: relative;
      min-width: 8px;
      background: rgba(216, 208, 195, .42);
      cursor: col-resize;
      touch-action: none;
    }

    .resize-handle::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 44px;
      border-radius: 999px;
      background: rgba(111, 103, 93, .34);
      transform: translate(-50%, -50%);
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: rgba(49, 95, 120, .14);
    }

    .section {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .section-head h2 {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .stat strong {
      display: block;
      font-size: 21px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      padding: 6px 9px;
      font-size: 12px;
    }

    .chip.active {
      color: white;
      border-color: var(--green);
      background: var(--green);
    }

    .main {
      display: grid;
      grid-template-rows: minmax(240px, 48%) minmax(260px, 52%);
      min-width: 0;
      min-height: 0;
    }

    .result-panel,
    .graph-panel {
      min-height: 0;
      overflow: hidden;
    }

    .result-panel {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 254, 250, .54);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .result-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 46px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 254, 250, .78);
    }

    .result-head h2 {
      margin: 0;
      font-size: 14px;
    }

    .mini-button {
      height: 30px;
      padding: 0 10px;
      font-size: 12px;
    }

    .result-list {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .item {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .9);
      color: var(--ink);
      cursor: pointer;
    }

    .item:hover,
    .item.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 95, 120, .1);
    }

    .item strong {
      display: block;
      font-size: 14px;
      line-height: 1.36;
      overflow-wrap: anywhere;
    }

    .item p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .item small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .metric-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .metric {
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 11px;
    }

    .link-list {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .inline-link {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .78);
      color: var(--ink);
      text-align: left;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .graph-panel {
      position: relative;
      background:
        linear-gradient(rgba(37, 35, 31, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 35, 31, .045) 1px, transparent 1px),
        rgba(247, 244, 238, .84);
      background-size: 34px 34px;
    }

    #graph {
      display: block;
      width: 100%;
      height: 100%;
    }

    .graph-tools {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      gap: 8px;
      z-index: 2;
    }

    .graph-note {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .92);
      color: var(--muted);
      font-size: 12px;
      box-shadow: var(--shadow);
    }

    .node circle {
      cursor: pointer;
      stroke: rgba(255, 254, 250, .92);
      stroke-width: 1.5;
    }

    .node.selected circle {
      stroke: var(--red);
      stroke-width: 3;
    }

    .node text {
      pointer-events: none;
      fill: var(--ink);
      font-size: 11px;
      paint-order: stroke;
      stroke: rgba(255, 254, 250, .88);
      stroke-linejoin: round;
      stroke-width: 4px;
    }

    .edge {
      stroke: rgba(73, 65, 56, .24);
      stroke-width: 1;
    }

    .detail {
      height: 100%;
      overflow: auto;
    }

    .detail-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .detail-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .tag {
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 11px;
    }

    .detail-body {
      padding: 16px;
      line-height: 1.68;
      font-size: 14px;
    }

    .detail-body h1,
    .detail-body h2,
    .detail-body h3 {
      line-height: 1.34;
    }

    .detail-body pre,
    .detail-body code {
      font-family: var(--mono);
    }

    .detail-body pre {
      overflow: auto;
      padding: 12px;
      border-radius: var(--radius);
      background: #25231f;
      color: #fffefa;
    }

    .detail-body blockquote {
      margin: 12px 0;
      padding: 8px 12px;
      border-left: 3px solid var(--green);
      background: rgba(63, 117, 101, .08);
      color: var(--muted);
    }

    .detail-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .detail-body th,
    .detail-body td {
      border: 1px solid var(--line);
      padding: 6px 8px;
      vertical-align: top;
    }

    .detail-body img {
      display: block;
      max-width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      cursor: zoom-in;
    }

    .media-frame {
      position: relative;
      margin: 14px 0;
    }

    .media-frame .media-action,
    .code-tools,
    .viz-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .media-frame .media-action {
      position: absolute;
      right: 8px;
      top: 8px;
      opacity: 0;
      transition: opacity .16s ease;
    }

    .media-frame:hover .media-action {
      opacity: 1;
    }

    .code-block {
      margin: 14px 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #25231f;
      overflow: hidden;
    }

    .code-tools {
      justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 254, 250, .14);
      background: rgba(255, 254, 250, .06);
      color: rgba(255, 254, 250, .78);
      font-size: 12px;
    }

    .code-tools .mini-button,
    .viewer-actions .mini-button,
    .viz-actions .mini-button,
    .media-frame .mini-button {
      background: rgba(255, 254, 250, .94);
    }

    .code-block pre {
      margin: 0;
      border-radius: 0;
      border: 0;
      max-height: 360px;
    }

    .doc-map,
    .viz-card {
      margin: 14px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 254, 250, .82);
    }

    .doc-map-head,
    .viz-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .doc-map-title,
    .viz-title {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
    }

    .doc-map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .doc-node {
      display: block;
      min-height: 44px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--ink);
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .doc-node small {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .flow-svg {
      display: block;
      width: 100%;
      min-height: 220px;
      border-radius: var(--radius);
      background:
        linear-gradient(rgba(37, 35, 31, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 35, 31, .035) 1px, transparent 1px),
        #fffefa;
      background-size: 28px 28px;
    }

    .viz-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .viz-table th,
    .viz-table td {
      border: 1px solid var(--line);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }

    .viewer-modal[hidden] {
      display: none;
    }

    .viewer-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(22, 20, 17, .58);
    }

    .viewer-shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      width: min(1120px, 94vw);
      max-height: 90vh;
      border: 1px solid rgba(255, 254, 250, .46);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 28px 70px rgba(0, 0, 0, .28);
      overflow: hidden;
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 254, 250, .94);
    }

    .viewer-head strong {
      overflow-wrap: anywhere;
    }

    .viewer-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .viewer-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
    }

    .viewer-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .viewer-body pre {
      margin: 0;
      min-height: 60vh;
      white-space: pre-wrap;
      overflow: auto;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1120px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100%;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
        height: auto;
        padding: 12px;
      }

      .brand {
        min-width: 0;
      }

      .tabs {
        overflow: auto;
        padding-bottom: 2px;
        width: 100%;
      }

      .search {
        width: 100%;
      }

      .result-head {
        align-items: flex-start;
        flex-direction: column;
        height: auto;
        min-height: 46px;
        padding: 10px 14px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .resize-handle {
        display: none;
      }

      .sidebar,
      .detail-panel {
        border-left: 0;
        border-right: 0;
      }

      .main {
        grid-template-rows: 420px 480px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">W</div>
        <div>
          <h1>llm-wiki 知识工作台</h1>
          <p id="buildMeta">加载数据中</p>
        </div>
      </div>
      <input id="searchInput" class="search" type="search" placeholder="搜索知识、项目、主题、正文">
      <nav id="tabs" class="tabs" aria-label="视图">
        <button class="tab active" type="button" data-view="all">全部</button>
        <button class="tab" type="button" data-view="projects">项目</button>
        <button class="tab" type="button" data-view="topics">主题</button>
        <button class="tab" type="button" data-view="recent">最近</button>
        <button class="tab" type="button" data-view="graph">图谱</button>
      </nav>
    </header>

    <section class="workspace">
      <aside class="sidebar">
        <section class="section">
          <div class="section-head">
            <h2>数据状态</h2>
            <span id="resultCount" class="meta">0 项</span>
          </div>
          <div class="stats">
            <div class="stat"><strong id="pageCount">0</strong><span>页面</span></div>
            <div class="stat"><strong id="edgeCount">0</strong><span>关系</span></div>
            <div class="stat"><strong id="projectCount">0</strong><span>项目</span></div>
            <div class="stat"><strong id="topicCount">0</strong><span>主题</span></div>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>类型</h2>
            <button id="clearFilters" class="mini-button" type="button">重置</button>
          </div>
          <div id="typeFilters" class="chips"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>项目</h2>
          </div>
          <div id="projectFilters" class="chips"></div>
        </section>
      </aside>

      <div class="resize-handle left-handle" data-resize="left" title="拖动调整左侧栏宽度"></div>

      <section class="main">
        <section class="result-panel">
          <div class="result-head">
            <h2 id="viewTitle">全部知识</h2>
            <span id="viewMeta" class="meta">准备就绪</span>
          </div>
          <div id="resultList" class="result-list"></div>
        </section>

        <section class="graph-panel">
          <div class="graph-tools">
            <button id="fitGraph" class="mini-button" type="button">居中</button>
            <button id="graphTop" class="mini-button" type="button">核心</button>
          </div>
          <svg id="graph" role="img" aria-label="知识关系图谱"></svg>
          <div class="graph-note">点击节点查看详情，搜索和筛选会同步影响图谱。</div>
        </section>
      </section>

      <div class="resize-handle right-handle" data-resize="right" title="拖动调整右侧栏宽度"></div>

      <aside class="detail-panel">
        <article id="detail" class="detail">
          <div class="empty">选择一条知识查看详情。</div>
        </article>
      </aside>
    </section>
  </main>

  <div id="viewerModal" class="viewer-modal" hidden>
    <div class="viewer-shell" role="dialog" aria-modal="true" aria-labelledby="viewerTitle">
      <div class="viewer-head">
        <strong id="viewerTitle">预览</strong>
        <div class="viewer-actions">
          <button id="viewerCopy" class="mini-button" type="button">复制</button>
          <button id="viewerClose" class="mini-button" type="button">关闭</button>
        </div>
      </div>
      <div id="viewerBody" class="viewer-body"></div>
    </div>
  </div>

  <script src="assets/d3.min.js"></script>
  <script src="assets/marked.min.js"></script>
  <script src="assets/purify.min.js"></script>
  <script>
    const colors = new Map([
      ["entity", "#9a3d31"],
      ["topic", "#3f7565"],
      ["source", "#315f78"],
      ["synthesis", "#6d5a88"],
      ["comparison", "#a66f1d"],
      ["query", "#6f675d"],
      ["project", "#2f6f7d"]
    ]);

    const labels = {
      entity: "实体",
      topic: "主题",
      source: "来源",
      synthesis: "综合",
      comparison: "对比",
      query: "检查",
      project: "项目"
    };

    const state = {
      meta: null,
      search: [],
      graph: { nodes: [], edges: [] },
      projects: [],
      topics: [],
      recent: [],
      contentCache: new Map(),
      activeView: "all",
      query: "",
      type: "all",
      project: "all",
      selectedId: "",
      simulation: null,
      showCoreOnly: false,
      layout: {
        leftWidth: 288,
        rightWidth: 380
      },
      viewerText: ""
    };

    const els = {
      buildMeta: document.getElementById("buildMeta"),
      searchInput: document.getElementById("searchInput"),
      tabs: document.getElementById("tabs"),
      pageCount: document.getElementById("pageCount"),
      edgeCount: document.getElementById("edgeCount"),
      projectCount: document.getElementById("projectCount"),
      topicCount: document.getElementById("topicCount"),
      resultCount: document.getElementById("resultCount"),
      typeFilters: document.getElementById("typeFilters"),
      projectFilters: document.getElementById("projectFilters"),
      clearFilters: document.getElementById("clearFilters"),
      viewTitle: document.getElementById("viewTitle"),
      viewMeta: document.getElementById("viewMeta"),
      resultList: document.getElementById("resultList"),
      detail: document.getElementById("detail"),
      graph: d3.select("#graph"),
      fitGraph: document.getElementById("fitGraph"),
      graphTop: document.getElementById("graphTop"),
      resizeHandles: document.querySelectorAll("[data-resize]"),
      viewerModal: document.getElementById("viewerModal"),
      viewerTitle: document.getElementById("viewerTitle"),
      viewerBody: document.getElementById("viewerBody"),
      viewerCopy: document.getElementById("viewerCopy"),
      viewerClose: document.getElementById("viewerClose")
    };

    function normalize(value) {
      return String(value || "").toLowerCase();
    }

    function labelForType(type) {
      return labels[type] || type || "其他";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderMarkdown(markdown) {
      if (window.marked && window.DOMPurify) {
        return DOMPurify.sanitize(marked.parse(markdown || ""));
      }
      return `<p>${escapeHtml(markdown || "")}</p>`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setupLayout() {
      const storedLeft = Number(localStorage.getItem("llmWikiLeftWidth"));
      const storedRight = Number(localStorage.getItem("llmWikiRightWidth"));
      if (Number.isFinite(storedLeft) && storedLeft > 0) state.layout.leftWidth = storedLeft;
      if (Number.isFinite(storedRight) && storedRight > 0) state.layout.rightWidth = storedRight;
      applyLayout(false);

      for (const handle of els.resizeHandles) {
        handle.addEventListener("pointerdown", (event) => startResize(event, handle.dataset.resize, handle));
        handle.addEventListener("dblclick", () => {
          state.layout.leftWidth = 288;
          state.layout.rightWidth = 380;
          applyLayout();
        });
      }
    }

    function startResize(event, side, handle) {
      if (window.innerWidth <= 1120) return;
      event.preventDefault();
      handle.classList.add("active");
      handle.setPointerCapture(event.pointerId);
      const startX = event.clientX;
      const startLeft = state.layout.leftWidth;
      const startRight = state.layout.rightWidth;
      const maxSide = Math.max(260, Math.min(720, window.innerWidth - 680));

      function move(pointerEvent) {
        if (side === "left") {
          state.layout.leftWidth = clamp(startLeft + pointerEvent.clientX - startX, 220, maxSide);
        } else {
          state.layout.rightWidth = clamp(startRight + startX - pointerEvent.clientX, 300, maxSide);
        }
        applyLayout();
      }

      function end(pointerEvent) {
        handle.classList.remove("active");
        handle.releasePointerCapture(pointerEvent.pointerId);
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", end);
      }

      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", end, { once: true });
    }

    function applyLayout(store = true) {
      document.documentElement.style.setProperty("--left-width", `${state.layout.leftWidth}px`);
      document.documentElement.style.setProperty("--right-width", `${state.layout.rightWidth}px`);
      if (store) {
        localStorage.setItem("llmWikiLeftWidth", String(state.layout.leftWidth));
        localStorage.setItem("llmWikiRightWidth", String(state.layout.rightWidth));
      }
      if (state.meta) requestAnimationFrame(renderGraph);
    }

    function openViewer({ title, node, text = "", copy = true }) {
      els.viewerTitle.textContent = title || "预览";
      els.viewerBody.replaceChildren();
      if (node) els.viewerBody.appendChild(node);
      state.viewerText = text || "";
      els.viewerCopy.hidden = !copy || !state.viewerText;
      els.viewerModal.hidden = false;
    }

    function closeViewer() {
      els.viewerModal.hidden = true;
      els.viewerBody.replaceChildren();
      state.viewerText = "";
    }

    function openImageViewer(img) {
      const full = new Image();
      full.src = img.currentSrc || img.src;
      full.alt = img.alt || "";
      openViewer({ title: img.alt || "图片预览", node: full, copy: false });
    }

    function openCodeViewer(source, language) {
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.textContent = source || "";
      pre.appendChild(code);
      openViewer({ title: `${language || "text"} 代码`, node: pre, text: source || "" });
    }

    function enhanceDetailBody(body, item) {
      renderDocumentMap(body);
      enhanceImages(body, item);
      enhanceCodeBlocks(body);
    }

    function renderDocumentMap(body) {
      const headings = [...body.querySelectorAll("h1, h2, h3, h4")]
        .filter((heading) => heading.textContent.trim());
      if (headings.length < 2) return;

      const map = document.createElement("section");
      map.className = "doc-map";
      const head = document.createElement("div");
      head.className = "doc-map-head";
      head.innerHTML = `<p class="doc-map-title">文档结构</p><span class="meta">${headings.length} 个节点</span>`;
      const grid = document.createElement("div");
      grid.className = "doc-map-grid";

      headings.slice(0, 18).forEach((heading, index) => {
        if (!heading.id) heading.id = `doc-section-${index + 1}`;
        const node = document.createElement("a");
        node.className = "doc-node";
        node.href = `#${heading.id}`;
        node.innerHTML = `<small>${heading.tagName}</small>${escapeHtml(heading.textContent.trim())}`;
        grid.appendChild(node);
      });

      map.append(head, grid);
      body.prepend(map);
    }

    function enhanceImages(body, item) {
      for (const img of [...body.querySelectorAll("img")]) {
        if (img.closest(".media-frame")) continue;
        const frame = document.createElement("figure");
        frame.className = "media-frame";
        img.parentNode.insertBefore(frame, img);
        frame.appendChild(img);

        const actions = document.createElement("div");
        actions.className = "media-action";
        const button = makeMiniButton("放大");
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          openImageViewer(img);
        });
        actions.appendChild(button);
        frame.appendChild(actions);

        img.title = "点击放大";
        img.addEventListener("click", () => openImageViewer(img));
        img.addEventListener("keydown", (event) => {
          if (event.key === "Enter") openImageViewer(img);
        });
        img.tabIndex = 0;
        if (!img.alt && item) img.alt = item.title;
      }
    }

    function enhanceCodeBlocks(body) {
      const blocks = [...body.querySelectorAll("pre > code")];
      for (const code of blocks) {
        const pre = code.parentElement;
        if (!pre || pre.closest(".code-block")) continue;
        const source = code.textContent || "";
        const language = codeLanguage(code);

        if (isFlowSource(language, source)) {
          const card = createFlowCard(source);
          pre.parentNode.insertBefore(card, pre);
        }

        const wrapper = document.createElement("div");
        wrapper.className = "code-block";
        const tools = document.createElement("div");
        tools.className = "code-tools";
        const label = document.createElement("span");
        label.textContent = language || "text";
        const actions = document.createElement("div");
        actions.className = "viz-actions";
        const expand = makeMiniButton("放大");
        const copy = makeMiniButton("复制");
        expand.addEventListener("click", () => openCodeViewer(source, language));
        copy.addEventListener("click", () => copyText(source, copy));
        actions.append(expand, copy);
        tools.append(label, actions);
        pre.parentNode.insertBefore(wrapper, pre);
        wrapper.append(tools, pre);
      }
    }

    function makeMiniButton(text) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "mini-button";
      button.textContent = text;
      return button;
    }

    function codeLanguage(code) {
      const match = String(code.className || "").match(/language-([\w-]+)/);
      return match ? match[1].toLowerCase() : "";
    }

    function isFlowSource(language, source) {
      if (/^(mermaid|flow|flowchart|dot|graphviz)$/.test(language || "")) return true;
      return /\b(flowchart|graph|digraph|mindmap)\b/i.test(source || "") && /(-->|---|==>|->|=>)/.test(source || "");
    }

    function createFlowCard(source) {
      const card = document.createElement("section");
      card.className = "viz-card";
      const head = document.createElement("div");
      head.className = "viz-head";
      const title = document.createElement("p");
      title.className = "viz-title";
      title.textContent = "流程图可视化";
      const actions = document.createElement("div");
      actions.className = "viz-actions";
      const expand = makeMiniButton("放大");
      expand.addEventListener("click", () => {
        openViewer({
          title: "流程图可视化",
          node: renderFlowSvg(source, true),
          text: source || ""
        });
      });
      actions.appendChild(expand);
      head.append(title, actions);
      card.append(head, renderFlowSvg(source, false));
      return card;
    }

    function parseFlow(source) {
      const nodes = new Map();
      const edges = [];
      const addNode = (token) => {
        const clean = cleanFlowToken(token);
        if (!clean.id) return null;
        if (!nodes.has(clean.id)) nodes.set(clean.id, clean);
        return nodes.get(clean.id);
      };

      for (const rawLine of String(source || "").split(/\r?\n/)) {
        let line = rawLine.trim();
        if (!line || line.startsWith("%%") || line.startsWith("#")) continue;
        if (/^(flowchart|graph|sequenceDiagram|stateDiagram|classDiagram|mindmap)\b/i.test(line)) continue;
        line = line.replace(/\|[^|]+\|/g, " ");
        const parts = line.split(/\s*(?:-->|---|==>|->|=>)\s*/).map((part) => part.trim()).filter(Boolean);
        if (parts.length < 2) continue;
        for (let index = 0; index < parts.length - 1; index += 1) {
          const from = addNode(parts[index]);
          const to = addNode(parts[index + 1]);
          if (from && to && from.id !== to.id) edges.push({ from: from.id, to: to.id });
        }
      }

      if (!edges.length) return parseOutlineFlow(source);
      return { nodes: [...nodes.values()], edges };
    }

    function parseOutlineFlow(source) {
      const nodes = [];
      const edges = [];
      const stack = [];
      for (const rawLine of String(source || "").split(/\r?\n/)) {
        const match = rawLine.match(/^(\s*)(?:[-*+]|\d+[.)]|#{1,6})\s+(.+)$/);
        if (!match) continue;
        const level = Math.floor(match[1].length / 2);
        const id = `n${nodes.length + 1}`;
        nodes.push({ id, label: match[2].replace(/[#*`]/g, "").trim().slice(0, 60) });
        if (stack[level - 1]) edges.push({ from: stack[level - 1], to: id });
        stack[level] = id;
        stack.length = level + 1;
      }
      return { nodes, edges };
    }

    function cleanFlowToken(token) {
      let value = String(token || "").replace(/[;{}]/g, "").trim();
      value = value.replace(/^(subgraph|end|classDef|class|style)\b.*$/i, "").trim();
      const labeled = value.match(/^([A-Za-z0-9_.:-]+)\s*[\[\(\{]([^}\]\)]+)[\]\)\}]/);
      if (labeled) return { id: labeled[1], label: labeled[2].replace(/^["']|["']$/g, "") };
      value = value.replace(/^["']|["']$/g, "").trim();
      return { id: value.replace(/\s+/g, "_").slice(0, 64), label: value.slice(0, 80) };
    }

    function renderFlowSvg(source, large) {
      const { nodes, edges } = parseFlow(source);
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.classList.add("flow-svg");
      const nodeMap = new Map(nodes.map((node) => [node.id, node]));
      if (!nodes.length) {
        svg.setAttribute("viewBox", "0 0 620 220");
        addSvgText(svg, 310, 110, "未识别到可视化关系", "middle", "14px");
        return svg;
      }

      const incoming = new Map(nodes.map((node) => [node.id, 0]));
      const outgoing = new Map(nodes.map((node) => [node.id, []]));
      for (const edge of edges) {
        incoming.set(edge.to, (incoming.get(edge.to) || 0) + 1);
        if (!outgoing.has(edge.from)) outgoing.set(edge.from, []);
        outgoing.get(edge.from).push(edge.to);
      }

      const levels = new Map();
      const roots = nodes.filter((node) => !incoming.get(node.id));
      const queue = (roots.length ? roots : [nodes[0]]).map((node) => ({ id: node.id, level: 0 }));
      while (queue.length) {
        const current = queue.shift();
        if (levels.has(current.id) && levels.get(current.id) <= current.level) continue;
        levels.set(current.id, current.level);
        for (const next of outgoing.get(current.id) || []) queue.push({ id: next, level: current.level + 1 });
      }
      nodes.forEach((node) => {
        if (!levels.has(node.id)) levels.set(node.id, 0);
      });

      const grouped = new Map();
      nodes.forEach((node) => {
        const level = levels.get(node.id);
        if (!grouped.has(level)) grouped.set(level, []);
        grouped.get(level).push(node);
      });
      const levelKeys = [...grouped.keys()].sort((a, b) => a - b);
      const colGap = large ? 250 : 210;
      const rowGap = large ? 100 : 82;
      const boxWidth = large ? 178 : 150;
      const boxHeight = large ? 52 : 44;
      const width = Math.max(620, levelKeys.length * colGap + 110);
      const height = Math.max(220, Math.max(...[...grouped.values()].map((group) => group.length)) * rowGap + 90);
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
      const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
      const markerId = `arrow-${Math.random().toString(36).slice(2)}`;
      marker.setAttribute("id", markerId);
      marker.setAttribute("viewBox", "0 0 10 10");
      marker.setAttribute("refX", "9");
      marker.setAttribute("refY", "5");
      marker.setAttribute("markerWidth", "7");
      marker.setAttribute("markerHeight", "7");
      marker.setAttribute("orient", "auto-start-reverse");
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
      path.setAttribute("fill", "#6f675d");
      marker.appendChild(path);
      defs.appendChild(marker);
      svg.appendChild(defs);

      levelKeys.forEach((level, levelIndex) => {
        const group = grouped.get(level);
        const x = 48 + levelIndex * colGap;
        const startY = (height - ((group.length - 1) * rowGap + boxHeight)) / 2;
        group.forEach((node, index) => {
          node.x = x;
          node.y = startY + index * rowGap;
        });
      });

      for (const edge of edges) {
        const from = nodeMap.get(edge.from);
        const to = nodeMap.get(edge.to);
        if (!from || !to) continue;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", from.x + boxWidth);
        line.setAttribute("y1", from.y + boxHeight / 2);
        line.setAttribute("x2", to.x);
        line.setAttribute("y2", to.y + boxHeight / 2);
        line.setAttribute("stroke", "#6f675d");
        line.setAttribute("stroke-width", "1.4");
        line.setAttribute("marker-end", `url(#${markerId})`);
        svg.appendChild(line);
      }

      for (const node of nodes) {
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", node.x);
        rect.setAttribute("y", node.y);
        rect.setAttribute("width", boxWidth);
        rect.setAttribute("height", boxHeight);
        rect.setAttribute("rx", "8");
        rect.setAttribute("fill", "#fffefa");
        rect.setAttribute("stroke", "#d8d0c3");
        rect.setAttribute("stroke-width", "1.2");
        group.appendChild(rect);
        addSvgText(group, node.x + boxWidth / 2, node.y + boxHeight / 2 + 4, truncate(node.label || node.id, large ? 26 : 18), "middle", large ? "13px" : "12px");
        svg.appendChild(group);
      }

      return svg;
    }

    function addSvgText(parent, x, y, text, anchor, size) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "text");
      node.setAttribute("x", x);
      node.setAttribute("y", y);
      node.setAttribute("text-anchor", anchor);
      node.setAttribute("fill", "#24221e");
      node.setAttribute("font-size", size);
      node.setAttribute("font-family", "var(--font)");
      node.textContent = text;
      parent.appendChild(node);
      return node;
    }

    function truncate(value, limit) {
      const text = String(value || "");
      return text.length > limit ? `${text.slice(0, limit - 1)}...` : text;
    }

    async function copyText(text, button = null) {
      try {
        await navigator.clipboard.writeText(text || "");
        if (button) {
          const original = button.textContent;
          button.textContent = "已复制";
          setTimeout(() => { button.textContent = original; }, 1200);
        }
      } catch (error) {
        openCodeViewer(text || error.message, "text");
      }
    }

    function sortByRecent(items) {
      return [...items].sort((a, b) => itemDate(b).localeCompare(itemDate(a)));
    }

    function itemDate(item) {
      return String(item && (item.updated || item.created || item.modified || item.latest) || "");
    }

    function itemById(id) {
      return state.search.find((entry) => entry.id === id);
    }

    async function loadJson(path) {
      const response = await fetch(path, { cache: "no-store" });
      if (!response.ok) throw new Error(`${path} ${response.status}`);
      return response.json();
    }

    async function init() {
      setupLayout();
      const [meta, graph, search, projects, topics, recent] = await Promise.all([
        loadJson("data/meta.json"),
        loadJson("data/graph-data.json"),
        loadJson("data/search-index.json"),
        loadJson("data/project-index.json"),
        loadJson("data/topic-index.json"),
        loadJson("data/recent-index.json")
      ]);

      state.meta = meta;
      state.graph = graph;
      state.search = search.items || [];
      state.projects = projects.projects || [];
      state.topics = topics.topics || [];
      state.recent = recent.items || [];

      els.buildMeta.textContent = `${meta.total_pages} 页 · ${meta.total_edges} 条关系 · ${meta.build_date}`;
      els.pageCount.textContent = meta.total_pages;
      els.edgeCount.textContent = meta.total_edges;
      els.projectCount.textContent = meta.project_count;
      els.topicCount.textContent = meta.topic_count;

      buildTypeFilters();
      buildProjectFilters();
      render();
      const first = state.search.find((item) => item.type === "topic") || state.search[0];
      if (first) selectItem(first.id);
    }

    function buildTypeFilters() {
      els.typeFilters.innerHTML = "";
      const counts = state.meta.type_counts || {};
      addChip(els.typeFilters, "all", `全部 ${state.meta.total_pages}`, state.type === "all", (value) => {
        state.type = value;
        render();
      });
      for (const [type, count] of Object.entries(counts)) {
        addChip(els.typeFilters, type, `${labelForType(type)} ${count}`, state.type === type, (value) => {
          state.type = value;
          render();
        });
      }
    }

    function buildProjectFilters() {
      els.projectFilters.innerHTML = "";
      addChip(els.projectFilters, "all", "全部项目", state.project === "all", (value) => {
        state.project = value;
        render();
      });
      for (const project of state.projects) {
        addChip(els.projectFilters, project.project_id, project.title, state.project === project.project_id, (value) => {
          state.project = value;
          state.activeView = "projects";
          setActiveTab();
          render();
        });
      }
    }

    function addChip(container, value, text, active, onClick) {
      const button = document.createElement("button");
      button.className = `chip${active ? " active" : ""}`;
      button.type = "button";
      button.textContent = text;
      button.addEventListener("click", () => onClick(value));
      container.appendChild(button);
    }

    function filteredSearch() {
      const query = normalize(state.query);
      return state.search.filter((item) => {
        const queryMatch = !query || normalize(item.search_text).includes(query);
        const typeMatch = state.type === "all" || item.type === state.type;
        const projectMatch = state.project === "all" || item.project === state.project;
        return queryMatch && typeMatch && projectMatch;
      });
    }

    function currentItems() {
      const base = filteredSearch();
      if (state.activeView === "projects") {
        const ids = new Set(state.projects.map((item) => item.id));
        return base.filter((item) => ids.has(item.id) || (state.project !== "all" && item.project === state.project));
      }
      if (state.activeView === "topics") {
        const ids = new Set(state.topics.map((item) => item.id));
        return base.filter((item) => ids.has(item.id) || item.type === "topic");
      }
      if (state.activeView === "recent") {
        const allowed = new Map(base.map((item) => [item.id, item]));
        return state.recent.map((item) => allowed.get(item.id)).filter(Boolean);
      }
      return sortByRecent(base);
    }

    function render() {
      buildTypeFilters();
      buildProjectFilters();
      renderResults();
      renderGraph();
    }

    function renderResults() {
      const items = currentItems();
      els.resultCount.textContent = `${items.length} 项`;
      const titles = {
        all: "全部知识",
        projects: "项目视图",
        topics: "主题视图",
        recent: "最近更新",
        graph: "图谱视图"
      };
      els.viewTitle.textContent = titles[state.activeView] || "全部知识";
      els.viewMeta.textContent = `${state.type === "all" ? "全部类型" : labelForType(state.type)} · ${state.project === "all" ? "全部项目" : state.project}`;
      els.resultList.innerHTML = "";

      if (state.activeView === "projects" && !state.query && state.type === "all") {
        renderProjectCards(items);
        return;
      }

      if (state.activeView === "topics" && !state.query && state.type === "all" && state.project === "all") {
        renderTopicCards();
        return;
      }

      if (!items.length) {
        els.resultList.innerHTML = '<div class="empty">没有匹配结果。</div>';
        return;
      }

      const visible = state.activeView === "graph"
        ? [...items].sort((a, b) => b.degree - a.degree).slice(0, 80)
        : items.slice(0, 140);

      for (const item of visible) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `item${state.selectedId === item.id ? " active" : ""}`;
        button.innerHTML = `
          <strong>${escapeHtml(item.title)}</strong>
          <p>${escapeHtml(item.summary || "暂无摘要")}</p>
          <small>${labelForType(item.type)} · ${escapeHtml(item.project || item.community || "未分组")} · ${escapeHtml(itemDate(item))}</small>
        `;
        button.addEventListener("click", () => selectItem(item.id));
        els.resultList.appendChild(button);
      }
    }

    function renderProjectCards(items) {
      const visibleProjects = state.project === "all"
        ? state.projects
        : state.projects.filter((project) => project.project_id === state.project);
      for (const project of visibleProjects) {
        const card = document.createElement("div");
        card.tabIndex = 0;
        card.className = `item${state.selectedId === project.id ? " active" : ""}`;
        card.innerHTML = `
          <strong>${escapeHtml(project.title)}</strong>
          <p>${escapeHtml(project.summary || "暂无摘要")}</p>
          <div class="metric-row">
            <span class="metric">${project.doc_count} 篇资料</span>
            <span class="metric">${project.session_count} 条会话</span>
            <span class="metric">最近 ${escapeHtml(project.latest || "")}</span>
          </div>
          ${renderInlineLinks(project.top_docs || [])}
        `;
        card.addEventListener("click", (event) => selectFromCard(event, project.id));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter") selectItem(project.id);
        });
        els.resultList.appendChild(card);
      }
    }

    function renderTopicCards() {
      for (const topic of state.topics) {
        const card = document.createElement("div");
        card.tabIndex = 0;
        card.className = `item${state.selectedId === topic.id ? " active" : ""}`;
        card.innerHTML = `
          <strong>${escapeHtml(topic.title)}</strong>
          <p>${escapeHtml(topic.summary || "暂无摘要")}</p>
          <div class="metric-row">
            <span class="metric">${topic.related_count} 条关联</span>
            ${(topic.tags || []).slice(0, 4).map((tag) => `<span class="metric">${escapeHtml(tag)}</span>`).join("")}
          </div>
          ${renderInlineLinks(topic.top_related || [])}
        `;
        card.addEventListener("click", (event) => selectFromCard(event, topic.id));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter") selectItem(topic.id);
        });
        els.resultList.appendChild(card);
      }
    }

    function renderInlineLinks(items, allowedIds = null) {
      const links = items
        .filter((item) => !allowedIds || allowedIds.has(item.id))
        .slice(0, 5)
        .map((item) => `
          <button class="inline-link" type="button" data-select-id="${escapeHtml(item.id)}">
            ${escapeHtml(item.title)} · ${labelForType(item.type)} · ${escapeHtml(itemDate(item))}
          </button>
        `)
        .join("");
      return links ? `<div class="link-list">${links}</div>` : "";
    }

    function selectFromCard(event, fallbackId) {
      const link = event.target.closest("[data-select-id]");
      selectItem(link ? link.dataset.selectId : fallbackId);
    }

    function selectItem(id) {
      state.selectedId = id;
      const item = itemById(id);
      renderResults();
      renderDetail(item);
      renderGraph();
    }

    async function loadContent(item) {
      if (!item || !item.content_path) return "";
      if (state.contentCache.has(item.id)) return state.contentCache.get(item.id);
      const data = await loadJson(item.content_path);
      state.contentCache.set(item.id, data.content || "");
      return data.content || "";
    }

    async function renderDetail(item) {
      if (!item) {
        els.detail.innerHTML = '<div class="empty">选择一条知识查看详情。</div>';
        return;
      }
      const tagValues = [
        labelForType(item.type),
        item.project || item.community,
        item.updated || item.created,
        ...item.tags.slice(0, 8),
        ...item.aliases.slice(0, 4)
      ].filter(Boolean);

      els.detail.innerHTML = `
        <div class="detail-head">
          <h2>${escapeHtml(item.title)}</h2>
          <div class="tags">${tagValues.map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
        </div>
        <div class="detail-body">正在读取正文...</div>
      `;
      try {
        const content = await loadContent(item);
        if (state.selectedId !== item.id) return;
        const body = els.detail.querySelector(".detail-body");
        body.innerHTML = renderMarkdown(content || item.summary || "");
        enhanceDetailBody(body, item);
      } catch (error) {
        if (state.selectedId !== item.id) return;
        const body = els.detail.querySelector(".detail-body");
        body.innerHTML = `<p>${escapeHtml(error.message)}</p>`;
      }
    }

    function graphItems() {
      const ids = new Set(currentItems().map((item) => item.id));
      let nodes = state.graph.nodes.filter((node) => ids.has(node.id));
      if (state.showCoreOnly || state.activeView === "graph") {
        nodes = nodes.sort((a, b) => b.degree - a.degree).slice(0, 90);
      } else {
        nodes = nodes.sort((a, b) => b.degree - a.degree).slice(0, 120);
      }
      const nodeIds = new Set(nodes.map((node) => node.id));
      const edges = state.graph.edges
        .filter((edge) => nodeIds.has(edge.from) && nodeIds.has(edge.to))
        .map((edge) => ({
          ...edge,
          source: edge.from,
          target: edge.to
        }));
      return { nodes: nodes.map((node) => ({ ...node })), edges };
    }

    function renderGraph() {
      const svg = els.graph;
      const element = svg.node();
      const width = element.clientWidth || 800;
      const height = element.clientHeight || 420;
      svg.attr("viewBox", `0 0 ${width} ${height}`);
      svg.selectAll("*").remove();
      if (state.simulation) state.simulation.stop();

      const { nodes, edges } = graphItems();
      if (!nodes.length) {
        svg.append("text")
          .attr("x", width / 2)
          .attr("y", height / 2)
          .attr("text-anchor", "middle")
          .attr("fill", "#6f675d")
          .text("没有可显示的节点");
        return;
      }

      const layer = svg.append("g");
      svg.call(d3.zoom().scaleExtent([0.35, 4]).on("zoom", (event) => layer.attr("transform", event.transform)));

      const link = layer.append("g")
        .selectAll("line")
        .data(edges)
        .join("line")
        .attr("class", "edge");

      const node = layer.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", (d) => `node${d.id === state.selectedId ? " selected" : ""}`)
        .call(d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended));

      node.append("circle")
        .attr("r", (d) => Math.max(6, Math.min(16, 6 + d.degree * .72)))
        .attr("fill", (d) => colors.get(d.type) || "#6f675d")
        .on("click", (event, d) => {
          event.stopPropagation();
          selectItem(d.id);
        });

      node.append("text")
        .attr("x", 11)
        .attr("y", 4)
        .text((d) => d.title.length > 18 ? `${d.title.slice(0, 18)}...` : d.title);

      state.simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(edges).id((d) => d.id).distance(88).strength(.38))
        .force("charge", d3.forceManyBody().strength(-230))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius((d) => Math.max(26, 20 + d.degree)))
        .on("tick", () => {
          link
            .attr("x1", (d) => d.source.x)
            .attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x)
            .attr("y2", (d) => d.target.y);
          node.attr("transform", (d) => `translate(${d.x},${d.y})`);
        });

      function dragstarted(event, d) {
        if (!event.active) state.simulation.alphaTarget(.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }
      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }
      function dragended(event, d) {
        if (!event.active) state.simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }
    }

    function setActiveTab() {
      for (const tab of els.tabs.querySelectorAll(".tab")) {
        tab.classList.toggle("active", tab.dataset.view === state.activeView);
      }
    }

    els.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      render();
    });

    els.tabs.addEventListener("click", (event) => {
      const tab = event.target.closest("[data-view]");
      if (!tab) return;
      state.activeView = tab.dataset.view;
      setActiveTab();
      render();
    });

    els.clearFilters.addEventListener("click", () => {
      state.type = "all";
      state.project = "all";
      state.query = "";
      els.searchInput.value = "";
      render();
    });

    els.graphTop.addEventListener("click", () => {
      state.showCoreOnly = !state.showCoreOnly;
      els.graphTop.textContent = state.showCoreOnly ? "全部" : "核心";
      renderGraph();
    });

    els.fitGraph.addEventListener("click", () => renderGraph());

    els.viewerClose.addEventListener("click", closeViewer);

    els.viewerModal.addEventListener("click", (event) => {
      if (event.target === els.viewerModal) closeViewer();
    });

    els.viewerCopy.addEventListener("click", () => copyText(state.viewerText, els.viewerCopy));

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.viewerModal.hidden) closeViewer();
    });

    window.addEventListener("resize", () => {
      clearTimeout(window.__wikiResize);
      window.__wikiResize = setTimeout(renderGraph, 160);
    });

    init().catch((error) => {
      els.buildMeta.textContent = "数据加载失败";
      els.resultList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
      els.detail.innerHTML = '<div class="empty">请先运行数据构建，并通过本地服务打开 public/index.html。</div>';
    });
  </script>
</body>
</html>
